<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妄想商铺 - 开启你的妄想世界之旅</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 动态背景层 -->
        <div class="bg-layer bg-layer-1"></div>
        <div class="bg-layer bg-layer-2"></div>
        
        <!-- 背景粒子效果 -->
        <div class="particles">
            <div class="particle" style="animation-delay: 0s;"></div>
            <div class="particle" style="animation-delay: 0.5s;"></div>
            <div class="particle" style="animation-delay: 1s;"></div>
            <div class="particle" style="animation-delay: 1.5s;"></div>
            <div class="particle" style="animation-delay: 2s;"></div>
            <div class="particle" style="animation-delay: 2.5s;"></div>
            <div class="particle" style="animation-delay: 3s;"></div>
            <div class="particle" style="animation-delay: 3.5s;"></div>
            <div class="particle" style="animation-delay: 4s;"></div>
            <div class="particle" style="animation-delay: 4.5s;"></div>
            <div class="particle" style="animation-delay: 5s;"></div>
            <div class="particle" style="animation-delay: 5.5s;"></div>
        </div>

        <!-- 魔法圆环装饰 -->
        <div class="magic-rings">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
        </div>

        <!-- 标题区域 -->
        <div class="title-section">
            <!-- 主标题 -->
            <h1 class="main-title">
                <span class="title-word title-word-1">妄想</span>
                <span class="title-divider">◆</span>
                <span class="title-word title-word-2">商铺</span>
            </h1>
            
            <!-- 副标题 -->
            <p class="sub-title">点击开启你的妄想世界之旅</p>
            
            <!-- 装饰线条 -->
            <div class="title-decoration">
                <div class="decor-line"></div>
                <div class="decor-dot"></div>
                <div class="decor-line"></div>
            </div>
            
            <!-- 点击提示 -->
            <div class="click-hint">
                <span class="cursor">▼</span>
                <span class="hint-text">点击进入</span>
            </div>
        </div>

        <!-- 装饰性边框 -->
        <div class="border-frame">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            <div class="border-line top"></div>
            <div class="border-line bottom"></div>
            <div class="border-line left"></div>
            <div class="border-line right"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
