<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绘境 - AI视频生成</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-brand">
            <div class="logo">绘境</div>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-link active">探索</a>
            <a href="#" class="nav-link">创作</a>
            <a href="#" class="nav-link">社区</a>
        </div>
        <div class="nav-actions">
            <button class="btn btn-secondary">我的作品</button>
            <div class="user-avatar">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="用户">
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 输入区 -->
        <section class="input-section">
            <div class="input-container">
                <h1 class="input-title">描述你想生成的视频</h1>
                <div class="input-box">
                    <textarea 
                        class="input-textarea" 
                        placeholder="例如：赛博朋克风格的雨夜街道，霓虹灯闪烁，一个身穿黑色风衣的主角站在雨中，远处有飞行汽车掠过..."
                        rows="3"
                    ></textarea>
                    <div class="input-actions">
                        <button class="btn-attach" title="添加参考图">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </button>
                        <button class="btn-generate" id="generateBtn">
                            <span>生成</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"/>
                                <polyline points="12 5 19 12 12 19"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- 素材选择区（可折叠） -->
                <div class="assets-section">
                    <button class="assets-toggle" id="assetsToggle">
                        <span>使用我的素材</span>
                        <svg class="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                    <div class="assets-panel" id="assetsPanel">
                        <div class="assets-tabs">
                            <button class="asset-tab active" data-tab="characters">角色卡</button>
                            <button class="asset-tab" data-tab="worlds">世界书</button>
                            <button class="asset-tab" data-tab="playsets">玩法集</button>
                        </div>
                        <div class="assets-content">
                            <div class="asset-grid" id="characterGrid">
                                <div class="asset-card" data-id="char1">
                                    <div class="asset-image" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);"></div>
                                    <div class="asset-name">夜行者</div>
                                    <div class="asset-desc">赛博朋克雇佣兵</div>
                                </div>
                                <div class="asset-card" data-id="char2">
                                    <div class="asset-image" style="background: linear-gradient(135deg, #f59e0b, #ef4444);"></div>
                                    <div class="asset-name">红狐</div>
                                    <div class="asset-desc">神秘黑客</div>
                                </div>
                                <div class="asset-card" data-id="char3">
                                    <div class="asset-image" style="background: linear-gradient(135deg, #10b981, #3b82f6);"></div>
                                    <div class="asset-name">白医生</div>
                                    <div class="asset-desc">地下医生</div>
                                </div>
                                <div class="asset-card add-new">
                                    <div class="asset-image">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="12" y1="5" x2="12" y2="19"/>
                                            <line x1="5" y1="12" x2="19" y2="12"/>
                                        </svg>
                                    </div>
                                    <div class="asset-name">新建角色</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 生成结果区（默认隐藏） -->
        <section class="generation-section" id="generationSection">
            <div class="generation-header">
                <h2>生成结果</h2>
                <div class="generation-actions">
                    <button class="btn btn-secondary" id="regenerateBtn">重新生成</button>
                    <button class="btn btn-secondary" id="editPromptBtn">修改描述</button>
                </div>
            </div>
            <div class="image-grid" id="imageGrid">
                <div class="image-card" data-index="0">
                    <div class="image-placeholder">
                        <div class="spinner"></div>
                        <span>生成中...</span>
                    </div>
                </div>
                <div class="image-card" data-index="1">
                    <div class="image-placeholder">
                        <div class="spinner"></div>
                        <span>生成中...</span>
                    </div>
                </div>
                <div class="image-card" data-index="2">
                    <div class="image-placeholder">
                        <div class="spinner"></div>
                        <span>生成中...</span>
                    </div>
                </div>
                <div class="image-card" data-index="3">
                    <div class="image-placeholder">
                        <div class="spinner"></div>
                        <span>生成中...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 视频生成区（选中图片后显示） -->
        <section class="video-section" id="videoSection">
            <div class="video-header">
                <h2>视频生成</h2>
                <div class="video-config">
                    <div class="config-item">
                        <label>时长</label>
                        <select class="config-select" id="durationSelect">
                            <option value="3">3秒</option>
                            <option value="5" selected>5秒</option>
                            <option value="10">10秒</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label>运动强度</label>
                        <select class="config-select" id="motionSelect">
                            <option value="low">低</option>
                            <option value="medium" selected>中</option>
                            <option value="high">高</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="video-preview" id="videoPreview">
                <div class="video-placeholder">
                    <div class="selected-image" id="selectedImage"></div>
                    <button class="btn btn-primary btn-generate-video" id="generateVideoBtn">
                        <span>生成视频</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- 社区作品流 -->
        <section class="community-section">
            <div class="section-header">
                <h2>探索社区创作</h2>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">全部</button>
                    <button class="filter-tab" data-filter="scifi">科幻</button>
                    <button class="filter-tab" data-filter="fantasy">奇幻</button>
                    <button class="filter-tab" data-filter="anime">动漫</button>
                    <button class="filter-tab" data-filter="realistic">写实</button>
                </div>
            </div>
            <div class="masonry-grid" id="masonryGrid">
                <div class="masonry-item">
                    <div class="video-card">
                        <div class="video-thumbnail" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">
                            <div class="play-overlay">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="none">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                            </div>
                            <div class="video-duration">5s</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">霓虹雨夜</div>
                            <div class="video-meta">
                                <span class="video-author">@赛博诗人</span>
                                <span class="video-stats">1.2k 播放</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="masonry-item">
                    <div class="video-card">
                        <div class="video-thumbnail" style="background: linear-gradient(135deg, #2d1b69, #0f3460);">
                            <div class="play-overlay">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="none">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                            </div>
                            <div class="video-duration">3s</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">魔法森林</div>
                            <div class="video-meta">
                                <span class="video-author">@幻想家</span>
                                <span class="video-stats">856 播放</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="masonry-item">
                    <div class="video-card">
                        <div class="video-thumbnail" style="background: linear-gradient(135deg, #1e3a5f, #2d5a87);">
                            <div class="play-overlay">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="none">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                            </div>
                            <div class="video-duration">10s</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">深海探险</div>
                            <div class="video-meta">
                                <span class="video-author">@海洋之心</span>
                                <span class="video-stats">2.3k 播放</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="masonry-item">
                    <div class="video-card">
                        <div class="video-thumbnail" style="background: linear-gradient(135deg, #3d1f00, #8b4513);">
                            <div class="play-overlay">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="none">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                            </div>
                            <div class="video-duration">5s</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">西部黄昏</div>
                            <div class="video-meta">
                                <span class="video-author">@牛仔杰克</span>
                                <span class="video-stats">567 播放</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="masonry-item">
                    <div class="video-card">
                        <div class="video-thumbnail" style="background: linear-gradient(135deg, #1a0a2e, #4a148c);">
                            <div class="play-overlay">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="none">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                            </div>
                            <div class="video-duration">5s</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">星空漫步</div>
                            <div class="video-meta">
                                <span class="video-author">@星际旅人</span>
                                <span class="video-stats">3.1k 播放</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="masonry-item">
                    <div class="video-card">
                        <div class="video-thumbnail" style="background: linear-gradient(135deg, #0d3328, #1a6b4e);">
                            <div class="play-overlay">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="none">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                            </div>
                            <div class="video-duration">3s</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">竹林剑影</div>
                            <div class="video-meta">
                                <span class="video-author">@武侠迷</span>
                                <span class="video-stats">1.8k 播放</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 图片编辑弹窗 -->
    <div class="modal" id="imageEditModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="modal-body">
                <div class="edit-preview">
                    <img id="editImage" src="" alt="选中图片">
                </div>
                <div class="edit-panel">
                    <h3>编辑场景描述</h3>
                    <textarea class="edit-textarea" id="editTextarea" rows="6"></textarea>
                    <div class="edit-actions">
                        <button class="btn btn-secondary" id="variantBtn">生成变体</button>
                        <button class="btn btn-primary" id="confirmBtn">确认使用</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
